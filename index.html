function openDoor(){

/* QUESTIONS WORKING */
let qIndex=0;
const qData=[
{type:"input", text:"1️⃣ What you want babu 💭"},
{type:"yesno", text:"2️⃣ Aap mere se paresan ho gyi ho? 😏"},
{type:"options", text:"3️⃣ apke according apke sb se close kon hai ❤️",

{type:"input", text:"4️⃣ apka kabhi mere sath asa krne ka mnn hua hai jo krna cahati ho but shy ki wajha se nhi kiya (kya hai vo bhi batao) "},

{type:"input", text:"6️⃣ So kuch kahna cahti ho aap ya krna anything (kuch bhi lekin aap krti nhi ho) 🤭? 💖"}
];

function showQuestions(){
  page3.style.display="none";
  questions.style.display="flex";
  loadQ();
}

function loadQ(){
  if(qIndex>=qData.length){
    sendAllAnswers();
    questions.style.display="none";
    startSlideshow();
    return;
  }

  let q=qData[qIndex];
  let box=document.getElementById("questionBox");
  box.innerHTML="<h3>"+q.text+"</h3>";

  if(q.type==="input"){
    box.innerHTML+=`<input id="ans"><br>
    <button onclick="nextInput()">Next</button>`;
  }

  if(q.type==="yesno"){
    box.innerHTML+=`
    <button onclick="yesQ()">Yes</button>
    <button id="noBtn" onclick="moveNo()">No</button>`;
  }

  if(q.type==="options"){
    q.options.forEach(o=>{
      box.innerHTML+=`<br><button onclick="selectOption('${o}')">${o}</button>`;
    });
  }
}

function nextInput(){
  saveAnswer(document.getElementById("ans").value);
  qIndex++;
  loadQ();
}

function selectOption(val){
  saveAnswer(val);
  qIndex++;
  loadQ();
}

function moveNo(){
  let btn=document.getElementById("noBtn");
  btn.style.position="absolute";
  btn.style.left=Math.random()*60+"%";
  btn.style.top=Math.random()*60+"%";
}

function yesQ(){

    icon: "success",
    confirmButtonText: "Theek hai Next "
  }).then(() => {
      qIndex++;
      loadQ();
  });
}

/* SLIDESHOW */
let currentSlide=1;

function startSlideshow(){

function slideShowLoop(){
  if(currentSlide<=totalSlides){
    document.getElementById("slideImg").src="photo"+currentSlide+".jpg";
    currentSlide++;
    setTimeout(slideShowLoop,3000);
  }else{
    document.getElementById("photoNextBtn").style.display="block";

}

function showFinal(){
